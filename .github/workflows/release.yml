name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive_os: linux
            archive_arch: x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            archive_os: linux
            archive_arch: aarch64
          - target: aarch64-apple-darwin
            os: macos-latest
            archive_os: macos
            archive_arch: aarch64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.94.1
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux system dependencies
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libgl1-mesa-dev \
            libgtk-3-dev \
            libwayland-dev \
            libx11-dev \
            libxcursor-dev \
            libxinerama-dev \
            libxkbcommon-dev \
            libxi-dev \
            libxrandr-dev

      - name: Install macOS icon tools
        if: startsWith(matrix.os, 'macos')
        run: brew install librsvg

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build macOS bundle
        if: matrix.archive_os == 'macos'
        run: ./macos/bundle.sh --target ${{ matrix.target }} --version ${{ github.ref_name }}

      - name: Package macOS archive
        if: matrix.archive_os == 'macos'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf "$GITHUB_WORKSPACE/lexito-${{ github.ref_name }}-${{ matrix.archive_os }}-${{ matrix.archive_arch }}.tar.gz" Lexito.app

      - name: Build Linux binary
        if: matrix.archive_os == 'linux'
        run: cargo build --release -p lexito --target ${{ matrix.target }}

      - name: Package Linux archive
        if: matrix.archive_os == 'linux'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf "$GITHUB_WORKSPACE/lexito-${{ github.ref_name }}-${{ matrix.archive_os }}-${{ matrix.archive_arch }}.tar.gz" lexito

      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: lexito-${{ matrix.archive_os }}-${{ matrix.archive_arch }}
          path: lexito-${{ github.ref_name }}-${{ matrix.archive_os }}-${{ matrix.archive_arch }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*.tar.gz
