name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.94.1
        with:
          components: rustfmt, clippy

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libgl1-mesa-dev \
            libgtk-3-dev \
            libwayland-dev \
            libx11-dev \
            libxcursor-dev \
            libxinerama-dev \
            libxkbcommon-dev \
            libxi-dev \
            libxrandr-dev

      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --check

      - name: Test
        run: cargo test --workspace

      - name: Build desktop release
        run: cargo build --release -p lexito

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: lexito-${{ matrix.os }}
          path: |
            target/release/lexito
            target/release/lexito.exe
